name: C++ CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Get the Code
      uses: actions/checkout@v4

    - name: Build the Docker Image
      run: docker build -t sysmon-app .

    - name: Run the Container
      run: docker run sysmon-app
